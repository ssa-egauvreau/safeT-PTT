appId: com.sunsetsafety.safetsdr
productName: SafeT SDR
copyright: Sunset Safety Agency

directories:
  output: dist
  buildResources: build

# Bundle the app source and the elevated usbipd helper script.
files:
  - src/**/*
  - package.json
extraResources:
  - from: scripts
    to: scripts

win:
  target:
    - nsis
  icon: build/icon.ico

nsis:
  oneClick: false
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SafeT SDR
  artifactName: ${productName} Setup ${version}.${ext}
