appId: com.sunsetsafety.safetsdr
productName: SafeT SDR
copyright: Sunset Safety Agency

directories:
  output: dist
  buildResources: build

# Bundle the app source and the elevated usbipd helper script.
files:
  - src/**/*
  - package.json
extraResources:
  - from: scripts
    to: scripts

win:
  target:
    - nsis
  icon: build/icon.ico

nsis:
  oneClick: false
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SafeT SDR
  artifactName: ${productName} Setup ${version}.${ext}

# Auto-update feed. The installer + latest.yml are published to a SEPARATE,
# PUBLIC "releases" repo (binaries only, no source). electron-updater reads
# release assets over GitHub's CDN with NO token, so the main safeT-PTT repo can
# stay PRIVATE and clients still update. To use a different repo/owner, change
# the two lines below (and point the CI release workflow's RELEASES_TOKEN at it).
# See sdr-bridge/desktop/README.md → "Updating the app".
publish:
  - provider: github
    owner: ssa-egauvreau
    repo: safet-sdr-releases
    releaseType: release
