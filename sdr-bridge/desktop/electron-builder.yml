appId: com.sunsetsafety.safetsdr
productName: SafeT SDR
copyright: Sunset Safety Agency

directories:
  output: dist
  buildResources: build

# Bundle the app source and the elevated usbipd helper script.
files:
  - src/**/*
  - package.json
extraResources:
  - from: scripts
    to: scripts

win:
  target:
    - nsis
  icon: build/icon.ico

nsis:
  oneClick: false
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SafeT SDR
  artifactName: ${productName} Setup ${version}.${ext}

# Auto-update feed. Currently published to the main safeT-PTT repo's Releases.
# This works WHILE THAT REPO IS PUBLIC (electron-updater reads release assets
# over GitHub's CDN with no token, and CI publishes with the default
# GITHUB_TOKEN — no extra setup).
#
# ⚠️ BEFORE you make safeT-PTT PRIVATE: switch `repo` below to a separate PUBLIC
# binaries-only repo (e.g. safet-sdr-releases) and give CI a RELEASES_TOKEN
# secret with Contents:read-write on it — otherwise installed apps can't read
# private release assets and auto-update silently stops. See
# sdr-bridge/desktop/README.md → "Updating the app".
publish:
  - provider: github
    owner: ssa-egauvreau
    repo: safeT-PTT
    releaseType: release
