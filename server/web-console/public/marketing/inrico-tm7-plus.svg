<svg width="1200" height="430" viewBox="0 0 1200 430" xmlns="http://www.w3.org/2000/svg">
 <defs>
 <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
 <stop offset="0" stop-color="#3b3f48"/>
 <stop offset="1" stop-color="#232730"/>
 </linearGradient>
 <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
 <stop offset="0" stop-color="#f7f8fb"/>
 <stop offset="1" stop-color="#e8ebf2"/>
 </linearGradient>
 </defs>

 <rect width="1200" height="430" fill="#171a20"/>
 <rect x="20" y="20" width="1160" height="390" rx="32" fill="url(#panel)" stroke="#4d525d" stroke-width="4"/>

 <!-- Main display block (Motorola-inspired look/colors) -->
 <rect x="210" y="60" width="430" height="225" rx="10" fill="#1a1f29" stroke="#5f6675" stroke-width="3"/>
 <rect x="226" y="76" width="398" height="160" rx="4" fill="url(#screen)" stroke="#c7ccd8" stroke-width="2"/>

 <!-- Status line -->
 <text x="248" y="108" fill="#6f7686" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Z</text>
 <rect x="236" y="92" width="8" height="18" fill="#68c35e"/>
 <rect x="246" y="88" width="8" height="22" fill="#68c35e"/>
 <rect x="256" y="84" width="8" height="26" fill="#68c35e"/>
 <text x="588" y="108" text-anchor="end" fill="#3c4250" font-size="26" font-family="Arial, Helvetica, sans-serif">⌁</text>

 <!-- Main channel text -->
 <text x="425" y="155" text-anchor="middle" fill="#161a22" font-size="48" font-family="Arial, Helvetica, sans-serif" font-weight="700">Zone A</text>
 <text x="425" y="202" text-anchor="middle" fill="#161a22" font-size="46" font-family="Arial, Helvetica, sans-serif" font-weight="700">Patrol North</text>

 <!-- soft key labels strip (above physical keys) -->
 <rect x="226" y="236" width="398" height="36" fill="#4b4f59"/>
 <line x1="325" y1="236" x2="325" y2="272" stroke="#6e7482"/>
 <line x1="425" y1="236" x2="425" y2="272" stroke="#6e7482"/>
 <line x1="525" y1="236" x2="525" y2="272" stroke="#6e7482"/>
 <text x="275" y="261" text-anchor="middle" fill="#f1f2f5" font-size="28" font-family="Arial, Helvetica, sans-serif">CH+</text>
 <text x="375" y="261" text-anchor="middle" fill="#f1f2f5" font-size="28" font-family="Arial, Helvetica, sans-serif">CH-</text>
 <text x="475" y="261" text-anchor="middle" fill="#f1f2f5" font-size="24" font-family="Arial, Helvetica, sans-serif">REPEAT</text>
 <text x="575" y="261" text-anchor="middle" fill="#f1f2f5" font-size="28" font-family="Arial, Helvetica, sans-serif">MENU</text>

 <!-- Physical bottom buttons location + mapping -->
 <rect x="230" y="286" width="86" height="48" rx="7" fill="#2f3440" stroke="#576075"/>
 <rect x="332" y="286" width="86" height="48" rx="7" fill="#2f3440" stroke="#576075"/>
 <rect x="434" y="286" width="86" height="48" rx="7" fill="#2f3440" stroke="#576075"/>
 <rect x="536" y="286" width="86" height="48" rx="7" fill="#2f3440" stroke="#576075"/>

 <text x="273" y="316" text-anchor="middle" fill="#cad3e8" font-size="18" font-family="Arial, Helvetica, sans-serif" font-weight="700">BTN 1</text>
 <text x="375" y="316" text-anchor="middle" fill="#cad3e8" font-size="18" font-family="Arial, Helvetica, sans-serif" font-weight="700">BTN 2</text>
 <text x="477" y="316" text-anchor="middle" fill="#cad3e8" font-size="18" font-family="Arial, Helvetica, sans-serif" font-weight="700">BTN 3</text>
 <text x="579" y="316" text-anchor="middle" fill="#cad3e8" font-size="18" font-family="Arial, Helvetica, sans-serif" font-weight="700">BTN 4</text>

 <!-- right control column hints -->
 <rect x="670" y="78" width="52" height="52" rx="10" fill="#2a2f3a" stroke="#5d6576"/>
 <rect x="670" y="140" width="52" height="52" rx="10" fill="#2a2f3a" stroke="#5d6576"/>
 <rect x="670" y="202" width="52" height="52" rx="10" fill="#2a2f3a" stroke="#5d6576"/>
 <circle cx="760" cy="188" r="56" fill="#2a2f3a" stroke="#5d6576" stroke-width="3"/>

 <text x="34" y="395" fill="#9ea7bb" font-size="22" font-family="Arial, Helvetica, sans-serif">
 TM7 Plus concept: Motorola-style visual language, bottom keys mapped to CH+/CH-/REPEAT/MENU, no on-screen emergency button.
 </text>
</svg>
