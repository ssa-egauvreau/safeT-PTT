<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';"
    />
    <title>safeT Command</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b1220;
        color: #ffffff;
        font-family: "Segoe UI", system-ui, -apple-system, Roboto, sans-serif;
      }
      .card {
        width: 460px;
        max-width: calc(100vw - 48px);
        padding: 32px;
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 12px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }
      .brand svg {
        width: 40px;
        height: 40px;
      }
      .brand-name {
        font-family: "Exo 2", "Segoe UI", system-ui, sans-serif;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      .brand-name .accent {
        color: #22c5e5;
      }
      .brand-name .sub {
        color: #94a3b8;
      }
      p {
        margin: 8px 0;
        line-height: 1.45;
        font-size: 14px;
        color: #94a3b8;
      }
      label {
        display: block;
        margin: 18px 0 6px;
        font-size: 12px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #94a3b8;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        font-size: 14px;
        color: #ffffff;
        background: #0b1220;
        border: 1px solid #1f2937;
        border-radius: 6px;
      }
      input:focus {
        outline: none;
        border-color: #2563eb;
      }
      .row {
        display: flex;
        gap: 10px;
        margin-top: 18px;
      }
      button {
        margin-top: 18px;
        padding: 10px 16px;
        font-size: 14px;
        font-weight: 600;
        color: #ffffff;
        background: #2563eb;
        border: 0;
        border-radius: 6px;
        cursor: pointer;
      }
      .row button {
        margin-top: 0;
        flex: 1;
      }
      button.secondary {
        color: #f3f4f6;
        background: #1f2937;
      }
      button:hover {
        filter: brightness(1.08);
      }
      .err {
        color: #ef4444;
      }
      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <svg viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="10" y="60" width="12" height="20" rx="2.5" fill="#2563eb" />
          <rect x="26" y="49" width="12" height="31" rx="2.5" fill="#2563eb" />
          <rect x="42" y="38" width="12" height="42" rx="2.5" fill="#2563eb" />
          <rect x="40" y="12" width="46" height="12" rx="3" fill="#2563eb" />
          <path d="M67 24 L53 51 L63 51 L55 84 L80 48 L67 48 L75 24 Z" fill="#22c5e5" />
        </svg>
        <span class="brand-name">safe<span class="accent">T</span> <span class="sub">Command</span></span>
      </div>
      <p id="lead">Loading…</p>

      <div id="setup" hidden>
        <label for="url">Dispatch server address</label>
        <input id="url" type="text" placeholder="https://dispatch.example.com" autocomplete="off" />
        <p>The address of your safeT PTT server. It is remembered on this computer.</p>
        <p id="err" class="err" hidden></p>
        <button id="connect">Connect</button>
      </div>

      <div id="error" hidden>
        <p id="error-detail" class="err"></p>
        <div class="row">
          <button id="retry">Retry</button>
          <button id="change" class="secondary">Change server…</button>
        </div>
      </div>
    </main>

    <script>
      const api = window.desktopConsole;
      const leadEl = document.getElementById("lead");
      const setupEl = document.getElementById("setup");
      const errorEl = document.getElementById("error");
      const urlInput = document.getElementById("url");
      const errEl = document.getElementById("err");
      const errorDetail = document.getElementById("error-detail");

      function showSetup(url) {
        errorEl.hidden = true;
        leadEl.textContent = "Connect safeT Command to your dispatch server.";
        urlInput.value = url || "";
        setupEl.hidden = false;
        urlInput.focus();
      }

      async function connect() {
        errEl.hidden = true;
        const result = await api.save(urlInput.value);
        if (!result.ok) {
          errEl.textContent = result.error || "Invalid address.";
          errEl.hidden = false;
        }
      }

      async function init() {
        if (!api) {
          leadEl.textContent = "Desktop bridge unavailable — restart the app.";
          return;
        }
        const state = await api.getState();
        if (state.mode === "error") {
          leadEl.textContent = "Could not reach the dispatch server.";
          errorDetail.textContent =
            (state.error || "Connection failed.") + (state.url ? "  (" + state.url + ")" : "");
          errorEl.hidden = false;
        } else {
          showSetup(state.url);
        }
      }

      document.getElementById("connect").addEventListener("click", connect);
      urlInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") connect();
      });
      document.getElementById("retry").addEventListener("click", () => api.retry());
      document.getElementById("change").addEventListener("click", () => showSetup(""));

      init();
    </script>
  </body>
</html>
