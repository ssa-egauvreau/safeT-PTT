name: Release SafeT SDR Desktop

# Auto-builds the SafeT SDR Windows app (sdr-bridge/desktop) and PUBLISHES the
# installer + latest.yml so installed copies auto-update — with NO manual click.
#
# Triggers on every push to main that touches the desktop app, but only actually
# builds/publishes when package.json's version isn't already released (so a
# desktop change without a version bump, or a re-run, just skips — and
# electron-builder never errors on an existing release). To ship a new version:
# bump `version` in sdr-bridge/desktop/package.json, merge to main — done.
#
# Releases currently go to THIS (public) repo's Releases via the publish block in
# sdr-bridge/desktop/electron-builder.yml. Before making the repo private, point
# that at a public binaries-only repo + add a RELEASES_TOKEN secret (see
# sdr-bridge/desktop/README.md → "Updating the app").
on:
  push:
    branches: [main]
    paths:
      - 'sdr-bridge/desktop/**'
      - '.github/workflows/sdr-desktop-release.yml'
  workflow_dispatch:

jobs:
  windows-release:
    runs-on: windows-latest
    permissions:
      contents: write # let the default GITHUB_TOKEN create the Release (same-repo publish)
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read app version
        id: ver
        shell: bash
        run: echo "version=$(node -p "require('./sdr-bridge/desktop/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip if this version is already released
        id: gate
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.ver.outputs.version }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "v${{ steps.ver.outputs.version }} is already released — nothing to publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "v${{ steps.ver.outputs.version }} not released yet — building."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.gate.outputs.publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.gate.outputs.publish == 'true'
        working-directory: sdr-bridge/desktop
        run: npm install

      - name: Build + publish installer and latest.yml
        if: steps.gate.outputs.publish == 'true'
        working-directory: sdr-bridge/desktop
        run: npm run release
        env:
          # Token for the repo named in electron-builder.yml's publish block.
          # Default GITHUB_TOKEN works while publishing to this same repo; a
          # RELEASES_TOKEN secret takes over once you point publish at another.
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN || secrets.GITHUB_TOKEN }}
